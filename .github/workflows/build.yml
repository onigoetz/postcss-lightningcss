name: Node CI

on:
  push:
    branches: [ main ]
  pull_request_target:
    branches: [ main ]

jobs:

  # Run linting only once
  lint: 
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'yarn'
    - name: Yarn install
      run: yarn install
    - name: Lint
      run: yarn lint

  # ─── Job 1: runs PR code, NO secrets, NO write permissions ───────────────
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [20.x, 22.x, 24.x]
        include:
        - os: macos-latest
          node-version: 20.x
        # TODO : add Windows build
        #- os: windows-latest
        #  node-version: 20.x
          
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
    - name: Yarn install
      run: yarn install
    - name: Test
      run: yarn test:ci
    - uses: actions/upload-artifact@v7
      if: matrix.node-version == '20.x'
      with:
        name: reports-${{ matrix.os }}-${{ matrix.node-version }}
        retention-days: 1
        path: |
          **/coverage/lcov.info
          **/coverage/TEST-*.xml
          !node_modules/**

  # ─── Job 2: uploads coverage using secrets, does NOT run PR code ─────────
  static_analysis:
    name: "🔬 Static Analysis"
    needs: build
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: read
    steps:
    # Commit is needed to check coverage files against content
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
        # Disabling shallow clone is needed by SonarQube
        fetch-depth: 0
    - uses: actions/download-artifact@v8
      with:
        pattern: reports-*
        path: __reports
    - run: find . -name "lcov.info"
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v7
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.junit.reportPaths=coverage
